name: LegacyiOS
options:
  bundleIdPrefix: com.legacyios
  deploymentTarget:
    iOS: "17.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
targets:
  LegacyiOS:
    type: application
    platform: iOS
    sources:
      - path: LegacyiOS
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.legacyios.runtime
        PRODUCT_NAME: LegacyiOS
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_FILE: LegacyiOS/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: LegacyiOS/Bridge/LegacyiOS-Bridging-Header.h
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        ENABLE_BITCODE: NO
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
    scheme:
      testTargets: []
